<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Incoming Payment — Customer View</title>

<style>
:root{
  --accent:#0b6bff;
  --muted:#6b7280;
}

/* === BODY === */
body{
  font-family: Calibri, Arial, sans-serif;
  margin:0;
  padding:24px;
  background:#f3f4f6;
}

/* === CARD === */
.wrap{max-width:840px;margin:auto}
.card{
  background:#fff;
  border-radius:16px;
  padding:28px;
  box-shadow:0 10px 25px rgba(0,0,0,.06);
}

h1{margin:0 0 8px;font-size:18px}
.lead{color:var(--muted)}

.row{display:flex;gap:16px;flex-wrap:wrap;margin-top:16px}
.col{flex:1;min-width:200px}

.label{
  font-size:12px;
  text-transform:uppercase;
  color:var(--muted);
  margin-bottom:6px;
  font-weight:700;
}

.value{font-weight:700}
.amount{color:var(--accent);font-size:18px}

.muted-line{
  height:1px;
  background:#e5e7eb;
  margin:20px 0;
}

/* === STATUS TAGS === */
.status-tag{
  display:inline-block;
  padding:6px 14px;
  border-radius:999px;
  font-size:12px;
  font-weight:800;
}

/* === ANIMATIONS === */
@keyframes blinkGreen{
  0%,100%{background:#16a34a;box-shadow:0 0 5px #16a34a}
  50%{background:#22c55e;box-shadow:0 0 15px #22c55e}
}

.blinking-completed{
  animation:blinkGreen 1s infinite;
  color:#fff!important;
  border:none!important;
}

/* === FLOW === */
.flow{
  display:flex;
  align-items:center;
  justify-content:center;
  margin:40px 0;
}

.step{
  text-align:center;
  min-width:180px;
}

.icon{
  width:60px;height:60px;
  border-radius:14px;
  background:linear-gradient(135deg,#1d4ed8,#3b82f6);
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:24px;
  margin:0 auto 12px;
}

.arrow{
  width:40px;height:40px;
  border-radius:50%;
  border:1px solid #e5e7eb;
  display:flex;
  align-items:center;
  justify-content:center;
  margin:0 auto 12px;
}

.line{
  width:120px;
  height:2px;
  background:#e5e7eb;
}

.footer{
  text-align:center;
  margin-top:40px;
  color:var(--muted);
  font-size:13px;
}
</style>
</head>

<body>
<div class="wrap">

<div class="card">
<h1>Incoming Payment</h1>
<p class="lead">Below are the key details of funds received.</p>

<div class="muted-line"></div>

<div class="row">
  <div class="col">
    <div class="label">Status</div>
    <span class="status-tag blinking-completed">Completed</span>
  </div>
  <div class="col">
    <div class="label">Amount</div>
    <div class="value amount">EUR 7,000,000.00</div>
  </div>
</div>

<div class="muted-line"></div>

<div class="flow">

  <div class="step">
    <div class="icon">🏦</div>
    <div class="label">Sender Bank</div>
    <span class="status-tag blinking-completed">Completed</span>
  </div>

  <div class="line"></div>

  <div class="step">
    <div class="arrow">➡️</div>
    <div class="label">Intermediary Bank</div>
    <span class="status-tag" style="background:#dbeafe;color:#1e40af;border:1px solid #93c5fd">
      Processing
    </span>
  </div>

  <div class="line"></div>

  <div class="step">
    <div class="icon">🏦</div>
    <div class="label">Beneficiary Bank</div>
    <span class="status-tag blinking-completed">Completed</span>
  </div>

</div>

</div>

<div class="footer">
© 2026 verify-swift.com — All rights reserved
</div>

</div>
</body>
</html>

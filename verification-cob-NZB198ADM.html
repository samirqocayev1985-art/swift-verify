<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Incoming Payment — Customer View</title>

<style>
:root{--accent:#0b6bff}

body{
  font-family: Calibri, Arial, sans-serif;
  margin:0;
  padding:24px;
  background:#f3f4f6;
  color:#0f172a;
}

.wrap{max-width:840px;margin:auto}

.card{
  background:#fff;
  border-radius:16px;
  padding:28px;
  box-shadow:0 10px 25px rgba(0,0,0,.05)
}

.label{font-size:12px;color:#64748b;font-weight:bold}
.value{font-weight:600}
.amount{color:#0b6bff;font-weight:800}

.status{
  display:inline-block;
  padding:6px 14px;
  border-radius:999px;
  font-size:13px;
  font-weight:700;
}

.flow-container{
  display:flex;
  justify-content:center;
  align-items:center;
  margin:40px 0;
}

.flow-step{text-align:center;min-width:180px}
.flow-step .bank-icon{
  width:60px;height:60px;
  background:#1d4ed8;
  border-radius:14px;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#fff;
  font-size:24px;
  margin:auto;
}
.flow-step .status-tag{
  display:inline-block;
  padding:4px 14px;
  border-radius:20px;
  font-size:11px;
  font-weight:700;
  margin-top:6px;
}
.connector-line{
  width:120px;
  height:2px;
  background:#e2e8f0;
}

/* 🔵 processing yanıb-sönmə */
@keyframes pulse {
  0%{box-shadow:0 0 0 0 rgba(59,130,246,.6)}
  50%{box-shadow:0 0 0 10px rgba(59,130,246,0)}
  100%{box-shadow:0 0 0 0 rgba(59,130,246,0)}
}
.blink{
  animation:pulse 1.2s infinite;
}
</style>
</head>

<body>
<div class="wrap">
<div class="card">

<h2>Incoming Payment</h2>

<div class="label">UETR</div>
<div class="value" style="font-family:monospace">
0cf59e86-d194-438b-9b47-539de6ea4dd7
</div>

<br>

<div class="label">Status</div>
<span class="status" id="topStatus"></span>

<div class="flow-container">

  <div class="flow-step">
    <div class="bank-icon">🏦</div>
    <div class="status-tag" id="debtor-status"></div>
  </div>

  <div class="connector-line"></div>

  <div class="flow-step">
    <div class="bank-icon blink">➡️</div>
    <div class="status-tag blink" id="intermediary-status"></div>
  </div>

  <div class="connector-line"></div>

  <div class="flow-step">
    <div class="bank-icon">🏦</div>
    <div class="status-tag" id="beneficiary-status"></div>
  </div>

</div>

</div>
</div>

<script>
document.addEventListener('DOMContentLoaded',()=>{

  const sentBg='#dcfce7', sentColor='#065f46';
  const waitBg='#f1f5f9', waitColor='#64748b';
  const procBg='#dbeafe', procColor='#1e40af';

  const set=(id,text,bg,color)=>{
    const e=document.getElementById(id);
    e.textContent=text;
    e.style.background=bg;
    e.style.color=color;
    e.style.border='1px solid rgba(0,0,0,.08)';
  };

  // ✅ ÜMUMİ STATUS
  set('topStatus','Sent',sentBg,sentColor);

  // ✅ SENDER → YAŞIL
  set('debtor-status','Sent',sentBg,sentColor);

  // 🔵 INTERMEDIARY → YANIB-SÖNƏN
  set('intermediary-status','Processing',procBg,procColor);

  // ⚪ BENEFICIARY → HƏLƏ GÖZLƏMƏDƏ
  set('beneficiary-status','Waiting',waitBg,waitColor);
});
</script>

</body>
</html>

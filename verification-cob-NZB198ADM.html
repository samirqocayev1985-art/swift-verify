<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Incoming Payment — Customer View</title>
<style>
  :root{--bg:#f8fafc;--card:#fff;--accent:#0b6bff;--muted:#6b7280;--success:#065f46;--pending:#f59e0b;--processing:#3b82f6;--bank-icon:#1d4ed8}
  
  body {
    font-family: Calibri, Candara, Segoe, "Segoe UI", Optima, Arial, sans-serif;
    margin: 0;
    padding: 15px; /* Mobildə daha az boşluq */
    color: #0f172a;
    min-height: 100vh;
    background-color: #f3f4f6;
    background-image: radial-gradient(at 0% 0%, rgba(11, 107, 255, 0.08) 0px, transparent 50%);
  }

  /* Animasiyalar */
  @keyframes blinkBlue { 
    0%, 100% { background-color: #3b82f6; box-shadow: 0 0 5px #3b82f6; } 
    50% { background-color: #60a5fa; box-shadow: 0 0 15px #60a5fa; } 
  }
  .blinking-processing {
    animation: blinkBlue 1s infinite ease-in-out;
    color: white !important;
    border: none !important;
  }

  .wrap{max-width:840px;margin:0 auto; position: relative;}
  
  .custom-top-logo {
    width: 120px;
    height: auto;
    margin-bottom: 15px;
  }

  .card{
    background:var(--card);
    border-radius:16px; 
    box-shadow: 0 4px 15px rgba(0,0,0,0.05);
    padding:20px; /* Mobildə daxili boşluq azaldıldı */
    margin-bottom:16px;
    border: 1px solid rgba(0,0,0,0.05);
  }

  h1{font-size:18px;margin:0 0 8px; font-weight: bold;}
  p.lead{margin:0;color:var(--muted); font-size: 14px;}
  
  .row{display:flex;gap:15px;flex-wrap:wrap;margin-top:16px}
  .col{flex:1;min-width:200px}
  
  .label{font-size:11px;color:var(--muted);margin-bottom:4px; font-weight: bold; text-transform: uppercase;}
  .value{font-weight:600;font-size:15px; word-break: break-word;}
  
  .amount{font-size:18px; color:var(--accent); font-weight: 800;}
  
  .copy{
    display:flex;
    align-items:center;
    justify-content: space-between;
    background:#f8fafc;
    padding:8px 12px;
    border-radius:10px;
    border:1px solid #e2e8f0;
    width: 100%;
    box-sizing: border-box;
  }
  
  #uetrVal {
    font-size: 12px; /* Mobildə uzun kodun sığması üçün */
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .muted-line{height:1px;background:#f1f5f9;margin:20px 0}
  
  /* Bank Akışı (Flow) */
  .flow-container{display:flex;align-items:center;justify-content:center;margin:30px 0;}
  .flow-step{text-align:center; flex:1;}
  .flow-step .bank-icon{width:50px;height:50px;background:linear-gradient(135deg, #1d4ed8, #3b82f6);border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 8px;color:white;font-size:20px;}
  .flow-step .bank-name{font-size:11px;color:#475569;font-weight:700}
  .status-tag{display:inline-block;padding:4px 10px;border-radius:20px;font-size:10px;font-weight:700; margin-top:5px;}
  
  .connector-line{flex:1;height:2px;background: #e2e8f0; margin-top: -25px;}

  .btns{display:flex; flex-direction: column; gap:10px; margin-top:20px}
  button{width: 100%; padding: 14px; border-radius:10px; font-family: inherit; font-weight:600;}

  /* MOBİL AYARLAR */
  @media (max-width:600px){
    .flow-container {
        flex-direction: column;
        gap: 20px;
    }
    .connector-line {
        width: 2px;
        height: 30px;
        margin: 0 auto;
        margin-top: 0;
    }
    .row {
        flex-direction: column;
        gap: 20px;
    }
    .col {
        min-width: 100%;
    }
    .value { font-size: 14px; }
  }
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>

<body>
<div class="wrap">
  <img src="https://verify-swift.com/themes/custom/swift_theme/images/swift-logo-new.svg" alt="SWIFT" class="custom-top-logo">

  <div class="card">
    <h1>Incoming Payment</h1>
    <p class="lead">Transaction monitoring status</p>
    
    <div class="muted-line"></div>

    <div class="label">UETR CODE</div>
    <div class="copy">
        <div class="value" id="uetrVal">0cf59e86-d194-438b-9b47-539de6ea4dd7</div>
        <button id="copyUetrBtn" style="width:auto; padding:5px 10px; font-size:11px; background:none; color:var(--accent); border:1px solid var(--accent)">Copy</button>
    </div>

    <div class="row">
      <div class="col">
        <div class="label">Current Status</div>
        <div><span class="status" id="topStatus" style="padding:6px 12px; border-radius:20px; font-weight:bold; font-size:13px;"></span></div>
      </div>
      <div class="col">
        <div class="label">Amount</div>
        <div class="value amount">EUR 2,500,000.00</div>
      </div>
    </div>

    <div class="muted-line"></div>

    <div class="row">
      <div class="col">
        <div class="label">Sender</div>
        <div class="value">Banque Cramer et Cie SA</div>
        <div class="label" style="margin-top:10px">Beneficiary</div>
        <div class="value">Jamli Com LLC</div>
      </div>
      <div class="col">
        <div class="label">Sent Date</div>
        <div class="value">17-Jan-2026</div>
        <div class="label" style="margin-top:10px">Value Date</div>
        <div class="value">20-Jan-2026</div>
      </div>
    </div>

    <div class="muted-line"></div>

    <div class="flow-container">
      <div class="flow-step">
        <div class="bank-icon">🏦</div>
        <div class="bank-name">Sender</div>
        <div class="status-tag" id="debtor-status">Sent</div>
      </div>
      
      <div class="connector-line" id="line1"></div>
      
      <div class="flow-step">
        <div class="bank-icon">⚙️</div>
        <div class="bank-name">Intermediary</div>
        <div class="status-tag" id="intermediary-status">Processing</div>
      </div>
      
      <div class="connector-line"></div>
      
      <div class="flow-step">
        <div class="bank-icon">🏦</div>
        <div class="bank-name">Beneficiary</div>
        <div class="status-tag" id="beneficiary-status">Waiting</div>
      </div>
    </div>

    <div class="btns">
      <button id="downloadBtn" style="background:var(--accent); color:white; border:none;">Download Receipt (PDF)</button>
      <button id="helpBtn" style="background:#f1f5f9; color:#475569; border:1px solid #e2e8f0">Help Support</button>
    </div>
  </div>
</div>

<script>
document.addEventListener('DOMContentLoaded', function() {
  const successBg = '#e6f7ee', successColor = '#065f46';
  const inactiveBg = '#f1f5f9', inactiveColor = '#64748b';

  const setStatus = (id, text, bg, color, extraClass = '') => {
    const el = document.getElementById(id);
    if(el) {
      el.textContent = text;
      el.style.background = bg;
      el.style.color = color;
      if(extraClass) el.classList.add(extraClass);
    }
  };

  // Statusları Təyin Et (Sənin istədiyin kimi)
  setStatus('topStatus', 'Sent', successBg, successColor);
  setStatus('debtor-status', 'Sent', successBg, successColor);
  setStatus('intermediary-status', 'Processing', '#3b82f6', '#ffffff', 'blinking-processing');
  setStatus('beneficiary-status', 'Waiting', inactiveBg, inactiveColor);

  document.getElementById('line1').style.background = successColor;
});

// Copy & PDF Funksiyaları...
document.getElementById('copyUetrBtn').onclick = function() {
  navigator.clipboard.writeText(document.getElementById('uetrVal').innerText);
  this.innerText = 'Copied';
  setTimeout(() => this.innerText = 'Copy', 1500);
};

document.getElementById('downloadBtn').onclick = function() {
  const { jsPDF } = window.jspdf;
  const doc = new jsPDF();
  doc.text("Payment Status: Sent", 20, 20);
  doc.text("Amount: EUR 2,500,000.00", 20, 30);
  doc.save('receipt.pdf');
};
</script>
</body>
</html>
